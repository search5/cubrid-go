name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: go vet
        run: go vet ./...
      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"

  unit-test:
    name: Unit Tests (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run unit tests
        run: go test -race -count=1 -run 'Test[^I]' ./...

  integration-test:
    name: Integration Tests (CUBRID ${{ matrix.cubrid-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cubrid-version: ['10.2', '11.2', '11.3', '11.4']
    services:
      cubrid:
        image: cubrid/cubrid:${{ matrix.cubrid-version }}
        ports:
          - 33000:33000
        env:
          CUBRID_DB: demodb
        options: >-
          --health-cmd "csql -u dba demodb -c 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Wait for CUBRID to be ready
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 33000 2>/dev/null; then
              echo "CUBRID is ready"
              break
            fi
            echo "Waiting for CUBRID... ($i/30)"
            sleep 2
          done
      - name: Run integration tests
        run: go test -race -count=1 -tags integration -run 'TestIntegration' -timeout 120s ./...
        env:
          CUBRID_DSN: "cubrid://dba:@localhost:33000/demodb"

  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    services:
      cubrid:
        image: cubrid/cubrid:11.4
        ports:
          - 33000:33000
        env:
          CUBRID_DB: demodb
        options: >-
          --health-cmd "csql -u dba demodb -c 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Wait for CUBRID
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 33000 2>/dev/null; then break; fi
            sleep 2
          done
      - name: Run benchmarks
        run: go test -tags integration -bench=. -benchmem -run='^$' -timeout 120s ./...
        env:
          CUBRID_DSN: "cubrid://dba:@localhost:33000/demodb"
